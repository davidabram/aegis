[package]
name = "aegis"
version = "0.1.0"
edition = "2024"

[lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"

[dependencies]
aes = "0.8"
axum = { version = "0.8", features = ["json"] }
bincode = { version = "2.0.1", features = ["serde"] }
cbc = { version = "0.1", features = ["alloc"] }
clap = { version = "4.5", features = ["derive"] }
libloading = "0.8"
pbkdf2 = "0.12"
rusqlite = "0.37"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.10"
tempfile = "3.23"
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "sync", "net"] }
thiserror = "2.0"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "debuginfo"
